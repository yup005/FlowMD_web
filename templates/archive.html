<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Full Gallery | FlowMD</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js"></script>
    <script src="https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js"></script>

    <style>
        body { background-color: #ffffff; color: #1a1a1a; font-family: 'Inter', sans-serif; overflow-x: hidden; -webkit-font-smoothing: antialiased; }

        /* 导航栏：保持固定，不随图片拉伸 */
        .navbar { background: white; padding: 1.5rem 0; border-bottom: 1px solid #f5f5f5; margin-bottom: 2rem; position: sticky; top: 0; z-index: 1000; }
        .navbar-brand { letter-spacing: 5px; font-weight: 200; text-transform: uppercase; font-size: 1rem; }

        .gallery-wrapper { max-width: 1200px; margin: 0 auto; padding: 0 25px; }

        /* 电脑端排版 (3列) */
        .grid-item { width: 33.333%; padding: 0 15px; margin-bottom: 40px; float: left; }
        .case-card { background: white; padding: 15px; border: 1px solid #eee; cursor: zoom-in; display: flex; flex-direction: column; transition: 0.3s; }
        .case-card:hover { border-color: #ccc; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        /* 🌟 核心修正：图片容器 */
        .img-container {
            position: relative;
            width: 100%;
            background: #fcfcfc;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .img-container img {
            width: 100%;
            height: auto;
            display: block;
            transition: opacity 0.6s ease;
        }

        .before-img { position: absolute; top: 0; left: 0; opacity: 0; z-index: 2; }
        .after-img { position: relative; z-index: 1; opacity: 1; }
        .case-card:hover .before-img { opacity: 1; }

        /* 标签与描述 */
        .ba-label { position: absolute; bottom: 10px; font-size: 0.5rem; text-transform: uppercase; letter-spacing: 1px; color: white; z-index: 5; background: rgba(0,0,0,0.2); padding: 2px 6px; }
        .label-before { left: 10px; opacity: 0; transition: 0.4s; }
        .label-after { right: 10px; opacity: 1; transition: 0.4s; }
        .case-card:hover .label-before { opacity: 1; }
        .case-card:hover .label-after { opacity: 0; }

        .case-title { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1.5px; margin-top: 15px; text-align: center; }

        /* 🌟 解决 PC 版描述溢出问题 */
        .case-desc {
            font-size: 0.65rem;
            color: #999;
            line-height: 1.6;
            margin-top: 8px;
            text-align: center;
            word-wrap: break-word; /* 强制长单词换行 */
            max-width: 100%;
        }

        /* 🌟 Lightbox 大图预览：无论多长，都在一屏内看全 */
        #lightbox-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #ffffff; z-index: 2000; cursor: pointer; padding: 40px 20px;
            justify-content: center; align-items: center;
        }
        #lightbox-overlay.show { display: flex; }
        .lightbox-content {
            display: flex;
            gap: 20px;
            max-width: 95%;
            max-height: 85vh; /* 限制大图最高只占屏幕 85% */
        }
        .lightbox-img-wrapper { flex: 1; display: flex; flex-direction: column; align-items: center; }
        .lightbox-img-wrapper img {
            max-width: 100%;
            max-height: 75vh; /* 🌟 核心：强制长图在预览时也缩放到一屏内 */
            object-fit: contain;
            border: 1px solid #eee;
        }
        .lightbox-caption { font-size: 0.6rem; text-transform: uppercase; letter-spacing: 3px; margin-bottom: 10px; color: #bbb; }
        .close-x { position: fixed; top: 20px; right: 25px; font-size: 24px; color: #000; z-index: 2101; cursor: pointer; }

        footer { margin-top: 5rem; border-top: 1px solid #eee; padding: 3rem 0; text-align: center; }

        /* 📱 手机端适配：彻底解决捏拉缩放问题 */
        @media (max-width: 768px) {
            .gallery-wrapper { padding: 0 20px; }
            .grid-item { width: 100%; padding: 0; margin-bottom: 30px; float: none; }

            .img-container {
                /* 🌟 重点：手机端限制图片显示高度为屏幕的 60% */
                /* 这样你一打开，Before/After 就完整在屏幕里，无需缩放网页 */
                max-height: 60vh;
            }

            .img-container img {
                width: 100%;
                height: 100%;
                /* 🌟 重点：使用 contain。它会自动把长图等比例缩小到能塞进容器里 */
                object-fit: contain;
            }

            .case-title { font-size: 0.85rem; }
            .case-desc { font-size: 0.75rem; padding: 0 10px; }

            /* 手机端预览大图上下排，但依然保持不超出屏幕 */
            .lightbox-content { flex-direction: column; overflow-y: auto; max-height: 90vh; }
            .lightbox-img-wrapper img { max-height: 40vh; }
        }

        /* 宽屏预览左右排 */
        @media (min-width: 992px) {
            .lightbox-content { flex-direction: row; }
        }
    </style>
</head>
<body>
    <nav class="navbar text-center">
        <div class="container">
            <a class="navbar-brand text-dark text-decoration-none" href="/">← BACK TO HOME</a>
        </div>
    </nav>

    <div class="gallery-wrapper">
        <h4 class="mb-5 text-center fw-light" style="letter-spacing: 4px; font-size: 1.1rem;">FULL CASE ARCHIVE</h4>

        <div class="masonry-grid">
            {% for case in cases %}
            <div class="grid-item">
                <div class="case-card" onclick="openComparisonLightbox('{{ url_for('static', filename='uploads/' + case.before_img) }}', '{{ url_for('static', filename='uploads/' + case.after_img) }}')">
                    <div class="img-container shadow-sm">
                        <div class="ba-label label-before">Before</div>
                        <div class="ba-label label-after">After</div>
                        <img src="{{ url_for('static', filename='uploads/' + case.before_img) }}" class="before-img">
                        <img src="{{ url_for('static', filename='uploads/' + case.after_img) }}" class="after-img">
                    </div>
                    <h6 class="case-title mb-1">{{ case.title }}</h6>
                    <div class="case-desc">{{ case.description if case.description and case.description != 'None' else '' }}</div>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <div id="lightbox-overlay" onclick="closeLightbox()">
        <span class="close-x">✕</span>
        <div class="lightbox-content" onclick="event.stopPropagation()">
            <div class="lightbox-img-wrapper">
                <div class="lightbox-caption">Before</div>
                <img id="lb-before" src="">
            </div>
            <div class="lightbox-img-wrapper">
                <div class="lightbox-caption">After</div>
                <img id="lb-after" src="">
            </div>
        </div>
    </div>

    <footer class="text-muted">
        <small style="font-size: 0.6rem; letter-spacing: 1px;">&copy; 2026 FLOW MD CLINIC. ALL RIGHTS RESERVED.</small>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            var grid = document.querySelector('.masonry-grid');
            imagesLoaded(grid, function() {
                new Masonry(grid, {
                    itemSelector: '.grid-item',
                    columnWidth: '.grid-item',
                    percentPosition: true,
                    transitionDuration: '0.4s'
                });
            });
        });

        function openComparisonLightbox(beforeUrl, afterUrl) {
            document.getElementById('lb-before').src = beforeUrl;
            document.getElementById('lb-after').src = afterUrl;
            const lb = document.getElementById('lightbox-overlay');
            lb.classList.add('show');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            const lb = document.getElementById('lightbox-overlay');
            lb.classList.remove('show');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
