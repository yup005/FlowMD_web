<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Full Gallery | FlowMD</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #fafafa; color: #333; font-family: 'Inter', sans-serif; }
        .navbar { background: white; padding: 1.5rem 0; border-bottom: 1px solid #eee; }
        .navbar-brand { letter-spacing: 5px; font-weight: 300; text-transform: uppercase; font-size: 1rem; }
        .case-card { background: white; padding: 15px; border: 1px solid #f0f0f0; margin-bottom: 20px; }
        .img-label { font-size: 10px; color: #999; text-transform: uppercase; }
    </style>
</head>
<body>
    <nav class="navbar text-center mb-5">
        <div class="container">
            <a class="navbar-brand text-dark text-decoration-none" href="/">← FLOWMD</a>
        </div>
    </nav>

    <div class="container">
        <h4 class="mb-4 text-muted fw-light">FULL CASE ARCHIVE</h4>
        <div class="row g-4">
            {% for case in cases %}
            <div class="col-md-4"> <div class="case-card shadow-sm">
                    <div class="row g-1 text-center">
                        <div class="col-6"><img src="{{ url_for('static', filename='uploads/' + case.before_img) }}" class="w-100"></div>
                        <div class="col-6"><img src="{{ url_for('static', filename='uploads/' + case.after_img) }}" class="w-100"></div>
                    </div>
                    <h6 class="text-center mt-2 mb-0">{{ case.title }}</h6>
                </div>
            </div>
            {% endfor %}
        </div>
    </div>

    <footer class="py-5 text-center text-muted mt-5">
        <a href="/" class="text-decoration-none text-muted small">Back to Home</a>
    </footer>
</body>
</html>
